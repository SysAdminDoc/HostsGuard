ShortDescription: Driver-free, single-host, zero-telemetry Windows network-privacy manager.
Description: >-
  HostsGuard is a Windows network-privacy manager with ask-to-connect consent,
  hosts-file and Windows Firewall rule management, DoH/QUIC survival, per-app and
  per-domain bandwidth, blocklist subscriptions and portable-policy import/export.
  Split-trust: an elevated LocalSystem service owns all mutation while the WPF UI
  runs unelevated over an ACL'd named pipe — no kernel driver, no account, no
  telemetry.
