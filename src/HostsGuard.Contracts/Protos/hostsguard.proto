syntax = "proto3";

// HostsGuard IPC contract, v1. Shared by the elevated service (server) and the
// unelevated UI + CLI (clients). Transport: gRPC over an ACL'd named pipe.
// Streaming RPCs deliver live DNS/connection/event feeds without polling.
package hostsguard.v1;

option csharp_namespace = "HostsGuard.Contracts";

import "google/protobuf/timestamp.proto";

// ─── Common ──────────────────────────────────────────────────────────────────

message Empty {}

message Ack {
  bool ok = 1;
  string message = 2;      // human-readable detail (never secrets)
  string error_code = 3;   // machine code, e.g. hostsguard.error.v1/invalid_domain
}

// ─── Diagnostics / health ────────────────────────────────────────────────────

service Diagnostics {
  rpc GetStatus(Empty) returns (ServiceStatus);
  // Writes a redacted support bundle zip under the service data dir; the
  // resulting path is returned in Ack.message. Never contains tokens/secrets.
  rpc ExportSupportBundle(Empty) returns (Ack);
  // Windows Defender integration: exclusion state + hosts-revert heuristic.
  rpc GetDefenderStatus(Empty) returns (DefenderStatus);
}

message DefenderStatus {
  bool available = 1;
  bool hosts_excluded = 2;      // hosts file present in Defender's ExclusionPath
  bool possible_revert = 3;     // hosts file empty of blocks while the DB expects them
  string guidance = 4;
}

message ServiceStatus {
  string version = 1;
  bool elevated = 2;
  int64 uptime_seconds = 3;
  int32 hosts_blocked = 4;
  int32 db_blocked = 5;
  int32 db_allowed = 6;
  int32 feed_total = 7;
  bool dns_monitor_active = 8;
  bool connection_monitor_active = 9;
}

// ─── Hosts control ───────────────────────────────────────────────────────────

service HostsControl {
  rpc Block(DomainRequest) returns (Ack);
  rpc Allow(DomainRequest) returns (Ack);
  rpc Unblock(DomainRequest) returns (Ack);
  rpc BlockRoot(DomainRequest) returns (Ack);
  rpc ListDomains(ListDomainsRequest) returns (DomainList);
  rpc Reconcile(ReconcileRequest) returns (Ack);
  rpc EmergencyReset(Empty) returns (Ack);
  // Temporarily allow a blocked domain; the service re-blocks it when the
  // window expires and re-arms persisted windows across service restarts.
  rpc TempAllow(TempAllowRequest) returns (Ack);
  rpc ListTempAllows(Empty) returns (TempAllowList);
  // Raw hosts file access for the editor view. Set routes through the
  // transactional engine (atomic write + self-write hash).
  rpc GetHostsText(Empty) returns (HostsText);
  rpc SetHostsText(HostsText) returns (Ack);
  // Feed visibility: hide a whole root (blanket, catches future subdomains) or
  // specific exact domains (e.g. every domain currently listed under a group).
  rpc HideRoot(DomainRequest) returns (Ack);
  rpc UnhideRoot(DomainRequest) returns (Ack);
  rpc HideDomains(HideDomainsRequest) returns (Ack);
  rpc UnhideDomains(HideDomainsRequest) returns (Ack);
  // Snapshot of recent DNS activity (the live delta streams via Monitoring.WatchDns).
  rpc GetActivity(ActivityRequest) returns (ActivityList);
  // 24h hourly hit histogram for a domain root (inline per-feed sparkline).
  rpc GetSparkline(DomainRequest) returns (Sparkline);
  // Copy the hosts file to a timestamped backup; path returned in Ack.message.
  rpc BackupHosts(Empty) returns (Ack);
  // Backup restore flow: enumerate the backups dir, then replace the live hosts
  // file with a chosen backup. Restore snapshots the current file first and
  // routes the write through the transactional engine.
  rpc ListBackups(Empty) returns (BackupList);
  rpc RestoreBackup(BackupRequest) returns (Ack);
  // Re-apply the hardened ACL to the hosts file.
  rpc HardenAcl(Empty) returns (Ack);
  // One-click: add the hosts file to Windows Defender's exclusions (WMI).
  rpc AddDefenderExclusion(Empty) returns (Ack);
  // AI domain categorization (DeepSeek). Config is stored in the ACL-locked
  // service data dir; the key is write-only (never returned).
  rpc SetAiConfig(AiConfig) returns (Ack);
  rpc GetAiStatus(Empty) returns (AiStatus);
  // Categorize the given domains (or every uncategorized blocked domain when
  // all_uncategorized is set), persist categories, and reorganize the managed
  // hosts entries under "# <Category>" section headers.
  rpc CategorizeDomains(CategorizeRequest) returns (CategorizeResult);
  // AI-research purpose descriptions for feed domains that have none (curated
  // or learned). Results persist to the ai_knowledge store.
  rpc ResearchPurposes(Empty) returns (CategorizeResult);
  // AI-identify what live connections are for; results persist to the
  // ai_knowledge store keyed by resolved host (or IP).
  rpc IdentifyConnections(IdentifyRequest) returns (IdentifyResult);
  // Everything the AI has learned (purposes, categories, connection info) as
  // reviewable JSON — the promotion path into the curated built-ins.
  rpc ExportAiKnowledge(Empty) returns (HostsText);
  // In-app AI-knowledge review (NET-107): list what the AI has learned (all or
  // only new since the last review), promote/discard entries into a persisted
  // user-override table that beats the AI, and correct a single domain's
  // category/purpose directly (the right-click "fix" path).
  rpc ListAiKnowledge(AiKnowledgeRequest) returns (AiKnowledgeList);
  rpc PromoteKnowledge(KnowledgeReviewRequest) returns (Ack);
  rpc OverrideKnowledge(KnowledgeOverrideRequest) returns (Ack);
}

message AiKnowledgeRequest {
  bool since_last_review = 1;   // true = only entries newer than the last review mark
}

message AiKnowledgeEntry {
  string kind = 1;        // "purpose" | "category" | "connection"
  string key = 2;         // domain, or host/ip for connections
  string value = 3;       // the AI-learned label
  string model = 4;
  string created = 5;
  string user_override = 6; // current user override for (kind,key); "" when none
  bool is_new = 7;        // created after the last review mark
}

message AiKnowledgeList {
  repeated AiKnowledgeEntry entries = 1;
  string last_reviewed = 2;   // ISO timestamp of the last review; "" = never
}

message KnowledgeReviewAction {
  string kind = 1;
  string key = 2;
  string action = 3;      // "promote" | "discard"
  string value = 4;       // promote: the (optionally edited) value to persist as an override
}

message KnowledgeReviewRequest {
  repeated KnowledgeReviewAction actions = 1;
  bool mark_reviewed = 2; // stamp the review timestamp (advances "since last review")
}

message KnowledgeOverrideRequest {
  string kind = 1;        // "purpose" | "category"
  string key = 2;         // domain
  string value = 3;       // the corrected label ("" clears the override)
}

message IdentifyItem {
  string remote_addr = 1;
  string host = 2;      // resolved domain when known; "" = identify by IP
  string process = 3;
  int32 remote_port = 4;
}

message IdentifyRequest {
  repeated IdentifyItem items = 1;
}

message IdentifiedItem {
  string key = 1;       // host when known, else the remote IP
  string info = 2;      // short human explanation of the connection
}

message IdentifyResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  repeated IdentifiedItem items = 4;
}

message AiConfig {
  string api_key = 1;    // "" keeps the stored key
  string model = 2;      // "" = deepseek-chat
  string endpoint = 3;   // "" = https://api.deepseek.com
  bool enabled = 4;      // auto-categorize new manual blocks
}

message AiStatus {
  bool configured = 1;   // an API key is stored
  bool enabled = 2;
  string model = 3;
  string endpoint = 4;
  string last_run = 5;   // ISO timestamp of the last categorization; "" = never
  string last_result = 6;
}

message CategorizeRequest {
  repeated string domains = 1;
  bool all_uncategorized = 2;
  // Categorize every hosts-FILE entry lacking a category (including entries
  // not managed in the DB), reusing the file's existing "# Category" section
  // names as the preferred vocabulary.
  bool hosts_file = 3;
}

message DomainCategory {
  string domain = 1;
  string category = 2;
}

message CategorizeResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int32 categorized = 4;
  repeated DomainCategory items = 5;
}

// ─── Blocklist / allowlist subscriptions ─────────────────────────────────────

service ListControl {
  // Curated catalog + subscription state.
  rpc ListBlocklistSources(Empty) returns (BlocklistSources);
  // Fetch + parse + bulk-import one source; records a subscription for refresh.
  rpc ImportBlocklist(BlocklistRequest) returns (BlocklistResult);
  // Stop refreshing a source (imported domains stay).
  rpc RemoveBlocklistSubscription(BlocklistRequest) returns (Ack);
  // Re-import every subscribed source now.
  rpc RefreshBlocklists(Empty) returns (BlocklistResult);
  // Allowlist subscriptions: whitelisted domains always win over blocklists.
  rpc GetAllowlists(Empty) returns (AllowlistUrls);
  rpc SetAllowlists(AllowlistUrls) returns (Ack);
  rpc RefreshAllowlists(Empty) returns (Ack);
  // Threat-intel IP overlay (Feodo) and the offline GeoIP database.
  rpc RefreshThreatIntel(Empty) returns (Ack);
  rpc RefreshGeoIp(Empty) returns (Ack);
  // Blocklist intelligence: every catalog source downloaded into a local
  // domain→list index (NOT imported as blocks) so the feed can flag domains
  // the reference lists would block. Refreshed on first start and weekly.
  rpc GetBlocklistIntelligence(Empty) returns (BlocklistIntelStatus);
  rpc RefreshBlocklistIntelligence(Empty) returns (Ack);
}

message BlocklistIntelStatus {
  int32 lists = 1;        // reference lists currently indexed
  int64 domains = 2;      // distinct (domain, list) rows
  string refreshed = 3;   // ISO timestamp of the last successful refresh; "" = never
  bool refreshing = 4;    // a refresh is running right now
}

message BlocklistRequest {
  string name = 1;
  string url = 2;
}

message BlocklistSource {
  string category = 1;
  string name = 2;
  string url = 3;
  bool subscribed = 4;
  string last_refresh = 5;
  int64 domain_count = 6;
  bool large_list_warning = 7; // known to bloat the hosts file (DNS Client CPU)
  string mirror = 8;           // fallback URL (NET-077); "" when none
}

message BlocklistSources {
  repeated BlocklistSource sources = 1;
}

message BlocklistResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int64 added = 4;          // newly blocked in the hosts file
  int64 total = 5;          // domains parsed from the source(s)
  int64 hosts_entries = 6;  // hosts-file entry count after import
  string warning = 7;       // e.g. DNS-Client CPU warning above 100k entries
  // NET-077 merge health report.
  int64 duplicates = 8;        // duplicate domains dropped
  int64 invalid = 9;           // unparseable/invalid lines dropped
  int64 hijack_flagged = 10;   // domains pointed at a non-sink routable IP (excluded)
  int64 allowlist_overrides = 11; // imported domains an allowlist kept unblocked
  bool mirror_used = 12;       // the primary URL failed and the mirror served the list
}

message AllowlistUrls {
  repeated string urls = 1;
}

message TempAllowRequest {
  string domain = 1;
  int32 minutes = 2;
  string source = 3;
}

message TempAllowEntry {
  string domain = 1;
  google.protobuf.Timestamp expires = 2;
}

message TempAllowList {
  repeated TempAllowEntry entries = 1;
}

message HostsText {
  string text = 1;
}

message BackupEntry {
  string file_name = 1;   // name only — never a path
  string created = 2;     // local "yyyy-MM-dd HH:mm:ss"
  int64 size_bytes = 3;
}

message BackupList {
  repeated BackupEntry entries = 1;
}

message BackupRequest {
  string file_name = 1;   // must match a BackupEntry.file_name
}

message ActivityRequest {
  int32 limit = 1;        // 0 = server default
  string search = 2;      // shared search DSL
  bool include_hidden = 3;
}

message ActivityRow {
  string domain = 1;
  string root = 2;
  string status = 3;      // "blocked" | "whitelisted" | ""
  string process = 4;
  int64 hits = 5;
  string first_seen = 6;
  string last_seen = 7;
  bool hidden = 8;
  string reason = 9;
  // Blocklist-intelligence membership: names of downloaded reference lists
  // that block this exact domain (a block-candidate signal in the feed).
  repeated string blocklists = 10;
  // Purpose description: the curated table first, then AI-researched
  // knowledge (ai_knowledge kind=purpose); "" when unknown.
  string purpose = 11;
}

message ActivityList {
  repeated ActivityRow rows = 1;
}

message Sparkline {
  repeated int32 hits = 1; // 24 hourly buckets, oldest → newest
}

message DomainRequest {
  string domain = 1;
  string reason = 2;   // canonical reason key or free-form (server canonicalizes)
  string source = 3;
}

message ListDomainsRequest {
  string status = 1;   // "", "blocked", "whitelisted"
  string search = 2;   // shared search DSL
  string source = 3;
}

message ManagedDomain {
  string domain = 1;
  string status = 2;
  string source = 3;
  string reason = 4;
  int64 hits = 5;
  google.protobuf.Timestamp added = 6;
  google.protobuf.Timestamp modified = 7;
  string notes = 8;
  string category = 9;   // e.g. "Google Ads", "Microsoft Telemetry"; "" = uncategorized
}

message DomainList {
  repeated ManagedDomain domains = 1;
}

message ReconcileRequest {
  repeated string blocked = 1;   // exact target set to enforce in the hosts file
}

// ─── Firewall control ────────────────────────────────────────────────────────

service FirewallControl {
  rpc BlockIp(FirewallIpRequest) returns (Ack);
  rpc BlockProgram(FirewallProgramRequest) returns (Ack);
  rpc CreateRule(FirewallRule) returns (Ack);
  rpc DeleteRule(RuleNameRequest) returns (Ack);
  rpc SetRuleEnabled(RuleEnabledRequest) returns (Ack);
  rpc ListRules(Empty) returns (FirewallRuleList);
  rpc BlockEncryptedDns(DohBlockRequest) returns (Ack);
  rpc UnblockEncryptedDns(Empty) returns (Ack);
  // QUIC/HTTP3 (outbound UDP/443) blocking. Forces clients to fall back to
  // TCP/HTTP2 so DoH3 and general QUIC can't bypass hosts/SNI-based blocking.
  // Opt-in, off by default; clean TCP fallback means no user-visible breakage.
  rpc BlockQuic(Empty) returns (Ack);
  rpc UnblockQuic(Empty) returns (Ack);
  // Default-outbound posture (lockdown). Set flips DefaultOutboundAction on
  // all profiles; it never touches the firewall on/off switch.
  rpc GetPosture(Empty) returns (FirewallPosture);
  rpc SetDefaultOutbound(OutboundRequest) returns (Ack);
  // Secure-Rules tamper-guard: recreate/re-enable HG_ rules changed behind our
  // back. Opt-in; only ever touches HostsGuard's own rules.
  rpc GetSecureRules(Empty) returns (SecureRulesStatus);
  rpc SetSecureRules(SecureRulesRequest) returns (Ack);
  // Orphan rebind: rank identity-matched replacement binaries for a program
  // rule whose target vanished, then re-target the rule.
  rpc SuggestRebind(RuleNameRequest) returns (RebindSuggestions);
  rpc RebindRule(RebindRequest) returns (Ack);
  // Global outbound posture selector (NET-076): "block-all" | "allow-all"
  // maps to the default-outbound action on every profile; applied without a
  // restart. Never touches the firewall on/off switch.
  rpc SetGlobalMode(GlobalModeRequest) returns (Ack);
  // Per-app network-scope block (NET-076): block a program's access to the
  // Internet / LAN / localhost, or all inbound. Portmaster-style scope rules.
  rpc BlockAppScope(AppScopeRequest) returns (Ack);
  rpc UnblockAppScope(AppScopeRequest) returns (Ack);
}

message GlobalModeRequest {
  string mode = 1;   // "block-all" | "allow-all"
}

message AppScopeRequest {
  string program_path = 1;
  string scope = 2;  // "internet" | "lan" | "localhost" | "inbound"
}

message FirewallPosture {
  bool available = 1;   // firewall engine attached and readable
  bool lockdown = 2;    // every profile's default outbound action is Block
  repeated ProfilePosture profiles = 3;
}

message ProfilePosture {
  string name = 1;      // "Domain" | "Private" | "Public"
  bool enabled = 2;
  bool outbound_block = 3;
}

message OutboundRequest {
  bool block = 1;
}

message SecureRulesRequest {
  bool enabled = 1;
}

message SecureRulesStatus {
  bool enabled = 1;
  int32 tracked = 2;   // HG_ rules under protection
}

message RebindCandidate {
  string path = 1;
  int32 score = 2;      // 0-100 identity-match confidence
  string reasons = 3;   // e.g. "same SHA-256; same signer"
}

message RebindSuggestions {
  string old_path = 1;
  bool ambiguous = 2;   // top two scores within 8 points — user must choose
  repeated RebindCandidate candidates = 3;
}

message RebindRequest {
  string name = 1;
  string new_program = 2;
}

message FirewallIpRequest {
  string address = 1;   // IP / CIDR / range
  string direction = 2; // "Outbound" | "Inbound"
}

message FirewallProgramRequest {
  string program_path = 1;
  string direction = 2;
}

message FirewallRule {
  string name = 1;
  string direction = 2; // "In" | "Out"
  string action = 3;    // "Block" | "Allow"
  bool enabled = 4;
  string remote_addr = 5;
  string protocol = 6;
  string program = 7;
  string source = 8;    // "hostsguard" | "system"
  bool orphaned = 9;    // program path no longer exists on disk
  bool drifted = 10;    // HG_ rule tracked in the DB but missing live (or vice versa)
  string remote_ports = 11; // "Any" or a COM port list, e.g. "853" (TCP/UDP only)
  string service_name = 12; // SCM short name the rule is scoped to (NET-073); "" = whole program
}

message FirewallRuleList {
  repeated FirewallRule rules = 1;
}

message RuleNameRequest { string name = 1; }
message RuleEnabledRequest { string name = 1; bool enabled = 2; }

message DohBlockRequest {
  repeated string exempt = 1; // the machine's own resolver IPs, never blocked
}

// ─── DNS control ─────────────────────────────────────────────────────────────

service DnsControl {
  rpc FlushCache(Empty) returns (Ack);
  rpc SetResolver(ResolverRequest) returns (Ack);
  rpc Inspect(DomainRequest) returns (DnsInspectResult);
  // DoH resolver intelligence (doh_resolvers.json): status + gated refresh.
  rpc GetDohStatus(Empty) returns (DohStatus);
  rpc RefreshDohIntelligence(DohRefreshRequest) returns (Ack);
  // CNAME-cloak reactive blocking: block a first-party host that CNAMEs to a
  // blocked tracker (uses the ETW resolution chain; opt-in).
  rpc SetCnameCloak(CnameCloakRequest) returns (Ack);
  // Reverse-resolve remote IPs the forward-DNS cache didn't cover (PTR), and
  // persist every result so future connections to the same IP show the host
  // automatically. Returns the resolved (address, host) pairs.
  rpc ResolveHosts(ResolveHostsRequest) returns (ResolveHostsResult);
}

message CnameCloakRequest {
  bool enabled = 1;
}

message ResolveHostsRequest {
  repeated string addresses = 1;
}

message ResolvedHostEntry {
  string address = 1;
  string host = 2;       // "" when the IP has no resolvable name
}

message ResolveHostsResult {
  repeated ResolvedHostEntry hosts = 1;
}

message DohStatus {
  int32 resolver_ips = 1;   // built-in + learned
  int32 extra_ips = 2;      // learned beyond the built-in set
  string updated = 3;
  string source = 4;
  string sha256 = 5;
  bool blocking_active = 6; // HG_DoH_* rules currently exist
  bool quic_blocked = 7;    // HG_QUIC_UDP443 rule currently exists
  bool cname_cloak = 8;     // CNAME-cloak reactive blocking is armed
}

message DohRefreshRequest {
  string url = 1;      // optional remote list; requires sha256 when set
  string sha256 = 2;   // expected hash of the remote payload
}

message ResolverRequest {
  repeated string servers = 1; // empty = reset to DHCP default
}

message DnsRecord {
  string type = 1;    // A / AAAA / CNAME
  string name = 2;
  int32 ttl = 3;
  string value = 4;
}

message DnsInspectResult {
  repeated DnsRecord records = 1;
  int32 latency_ms = 2;
  bool blocked = 3;
}

// ─── Monitoring (server-streaming live feeds) ────────────────────────────────

service Monitoring {
  rpc WatchDns(Empty) returns (stream DnsEvent);
  rpc WatchConnections(Empty) returns (stream ConnectionEvent);
  rpc WatchEvents(Empty) returns (stream ActivityEvent);
  // Persistent, retention-bounded connection history (NET-070). Recorded
  // server-side on first sighting of a connection tuple; nothing leaves the
  // machine.
  rpc GetConnectionHistory(ConnectionHistoryRequest) returns (ConnectionHistoryList);
  // Per-app bandwidth timeline (NET-070): ETW kernel network byte counters
  // aggregated per process per minute. Series are zero-filled and aligned,
  // oldest → newest, one bucket per minute.
  rpc GetAppBandwidth(BandwidthRequest) returns (AppBandwidthList);
  // History retention policy (default 30 days; prune runs opportunistically).
  rpc GetHistorySettings(Empty) returns (HistorySettings);
  rpc SetHistorySettings(HistorySettings) returns (Ack);
}

message ConnectionHistoryRequest {
  int32 limit = 1;      // 0 = server default
  string search = 2;    // substring match on process / remote address / country
  string since = 3;     // ISO-8601 floor (optional)
}

message ConnectionHistoryRow {
  string ts = 1;
  string process = 2;
  int32 pid = 3;
  string protocol = 4;
  string remote_addr = 5;
  int32 remote_port = 6;
  string country = 7;
  string fw_status = 8; // "", "THREAT", …
}

message ConnectionHistoryList {
  repeated ConnectionHistoryRow rows = 1;
}

message BandwidthRequest {
  int32 minutes = 1;    // window width; 0 = server default (60)
  int32 top = 2;        // max processes; 0 = server default (5)
}

message AppBandwidthSeries {
  string process = 1;
  repeated int64 bytes = 2;   // per-minute sent+recv, zero-filled, oldest → newest
  int64 total_sent = 3;
  int64 total_recv = 4;
}

message AppBandwidthList {
  repeated AppBandwidthSeries series = 1;
  bool counters_active = 2;   // ETW byte counters are running (elevation-gated)
}

message HistorySettings {
  int32 retention_days = 1;   // clamp 1..365
}

message DnsEvent {
  string domain = 1;
  string process = 2;
  int32 pid = 3;
  bool blocked = 4;
  google.protobuf.Timestamp ts = 5;
  // Blocklist-intelligence membership (see ActivityRow.blocklists).
  repeated string blocklists = 6;
  // Authoritative hidden state (exact-domain or hidden-root); the client drops
  // these live events unless Show hidden is on, so hides never bounce back.
  bool hidden = 7;
}

message HideDomainsRequest {
  repeated string domains = 1;
}

message ConnectionEvent {
  string protocol = 1;
  string local_addr = 2;
  int32 local_port = 3;
  string remote_addr = 4;
  int32 remote_port = 5;
  string host = 6;
  string process = 7;
  int32 pid = 8;
  string state = 9;
  string country = 10;
  string category = 11;
  string fw_status = 12; // "", "HOSTS", "FW BLOCK", "THREAT"
  google.protobuf.Timestamp ts = 13;
  string service = 14;   // owning SCM service display name(s) (NET-073); "" for plain apps
}

message ActivityEvent {
  google.protobuf.Timestamp ts = 1;
  string domain = 2;
  string action = 3;
  string process = 4;
  string details = 5;
  string reason = 6;
}

// ─── Consent loop (WFC-parity notify/learning) ───────────────────────────────

service Consent {
  // Live stream of pending decision requests (Notify mode pushes here).
  rpc WatchDecisions(Empty) returns (stream ConnectionDecisionRequest);
  // Answer a pending request; re-decide from history by leaving id empty.
  rpc Decide(ConnectionDecision) returns (Ack);
  // Filtering mode: "normal" enforces silently, "notify" prompts on unruled
  // connections, "learning" auto-allows and records. Switching into
  // notify/learning arms detection (audit + default-outbound Block, prior
  // posture saved); switching back to normal restores the saved posture.
  rpc GetMode(Empty) returns (FilteringMode);
  rpc SetMode(FilteringMode) returns (Ack);
  rpc GetDecisionHistory(HistoryRequest) returns (DecisionHistory);
  // Known-safe baseline (NET-068): inspect the curated OS-essential binaries
  // that never prompt, and proactively write their allow rules.
  rpc GetBaseline(Empty) returns (BaselineList);
  rpc ApplyBaseline(Empty) returns (Ack);
  // "Decide later" review (NET-074): Learning mode auto-allows and records —
  // these RPCs list the recorded auto-decisions (HG_Learn_ rules) and let the
  // user batch-promote them to permanent consent rules, reverse them to
  // blocks, or discard them (back to prompting).
  rpc GetLearned(Empty) returns (LearnedList);
  rpc ReviewLearned(LearnedReviewRequest) returns (Ack);
}

message LearnedEntry {
  string rule_name = 1;
  string application = 2;
  string direction = 3;   // "In" | "Out"
  string service_name = 4; // SCM scope when present
}

message LearnedList {
  repeated LearnedEntry entries = 1;
}

message LearnedReviewAction {
  string rule_name = 1;
  string action = 2;      // "promote" | "block" | "discard"
}

message LearnedReviewRequest {
  repeated LearnedReviewAction actions = 1;
}

message BaselineItem {
  string file_name = 1;
  string description = 2;
  bool present = 3;   // the binary exists on this machine
}

message BaselineList {
  repeated BaselineItem items = 1;
}

message ConnectionDecisionRequest {
  string id = 1;              // pending-cache key; expires server-side
  string application = 2;     // DOS path
  string direction = 3;       // "In" | "Out"
  string remote_address = 4;
  int32 remote_port = 5;
  string protocol = 6;
  int32 process_id = 7;
  google.protobuf.Timestamp ts = 8;
  // Decision-quality enrichment (best-effort; blank/false when unavailable).
  string country = 9;         // ISO country code of the remote IP (GeoIP)
  bool threat = 10;           // remote IP is on the threat-intel overlay
  string signer = 11;         // Authenticode signer subject of the application
  // svchost attribution (NET-073). service = display text; service_key = the
  // SCM short name when exactly ONE service owns the PID (else blank — a
  // per-service rule would be ambiguous).
  string service = 12;
  string service_key = 13;
}

message ConnectionDecision {
  string id = 1;              // echo of the request id ("" = re-decide)
  string application = 2;
  string direction = 3;
  string remote_address = 4;
  string protocol = 5;
  string verdict = 6;         // "allow" | "block"
  bool permanent = 7;         // legacy: permanent vs once-rule (overridden by duration)
  bool scope_remote = 8;      // restrict the rule to remote_address
  int32 remote_port = 9;      // echoed from the request, used when scope_port is set
  bool scope_port = 10;       // restrict the rule to remote_port (implies TCP/UDP protocol)
  bool scope_protocol = 11;   // restrict the rule to protocol
  string duration = 12;       // "once" | "1h" | "session" | "always" (blank = legacy permanent flag)
  bool scope_service = 13;    // restrict the rule to the owning service (NET-073)
  string service_key = 14;    // echoed request.service_key (SCM short name)
}

message FilteringMode {
  string mode = 1;            // "normal" | "notify" | "learning"
  bool detection_armed = 2;   // audit + watch active (read-only, set by server)
}

message HistoryRequest {
  int32 limit = 1;            // 0 = server default
}

message DecisionEntry {
  string decided_at = 1;
  string application = 2;
  string direction = 3;
  string remote_address = 4;
  string protocol = 5;
  string verdict = 6;         // "allow" | "block" | "timeout" | "learn"
  bool permanent = 7;
}

message DecisionHistory {
  repeated DecisionEntry entries = 1;
}

// ─── Policy / profiles / scheduling ──────────────────────────────────────────

service Policy {
  rpc ListProfiles(Empty) returns (ProfileList);
  rpc SwitchProfile(ProfileRequest) returns (Ack);
  rpc SetSchedules(ScheduleList) returns (Ack);
  rpc GetSchedules(Empty) returns (ScheduleList);
  rpc ToggleService(ServiceToggleRequest) returns (Ack);
  // One-click service sets + the Windows telemetry preset, with block state.
  rpc ListServices(Empty) returns (ServiceStates);
  // Named rule-set profiles: snapshot, switch (with hosts reconcile), delete.
  rpc SaveProfile(ProfileRequest) returns (Ack);
  rpc DeleteProfile(ProfileRequest) returns (Ack);
  // Settings/rule lock (NET-079): arm/disarm with a password and timed-unlock.
  // When armed, mode/posture/rule mutations are refused until unlocked.
  rpc GetLockState(Empty) returns (LockState);
  rpc SetLock(LockRequest) returns (Ack);
  rpc Unlock(LockRequest) returns (Ack);
  // Hosts-file write protection (NET-079): enforce/relax the SYSTEM+Admins-only
  // DACL that keeps third parties from writing the hosts file.
  rpc SetHostsProtection(HostsProtectionRequest) returns (Ack);
  // Automatic network-profile switching (NET-083): fingerprint the joined
  // network (gateway MAC) and auto-activate the mapped profile.
  rpc GetCurrentNetwork(Empty) returns (CurrentNetwork);
  rpc GetNetworkProfiles(Empty) returns (NetworkProfileMap);
  rpc SetNetworkProfile(NetworkProfileEntry) returns (Ack);
  // Full portable-policy export/import (NET-089): one versioned JSON document
  // covering managed domains, HG_ firewall rules, schedules, profiles, the
  // settings lock, network profiles, and allow/blocklist subscriptions. Import
  // reconstructs the policy on a clean machine; the round-trip is idempotent.
  rpc ExportPolicy(Empty) returns (PolicyDocument);
  rpc ImportPolicy(ImportPolicyRequest) returns (ImportPolicyResult);
}

message PolicyDocument {
  string json = 1;   // the versioned portable-policy JSON
}

message ImportPolicyRequest {
  string json = 1;
  bool merge = 2;    // reserved; import currently reconstructs (idempotent merge)
}

message ImportPolicyResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  repeated string summary = 4;   // per-section applied counts (human-readable)
}

message CurrentNetwork {
  string fingerprint = 1;
  string label = 2;      // the interface/network name
  bool online = 3;
}

message NetworkProfileEntry {
  string fingerprint = 1;
  string profile = 2;    // "" removes the mapping
  string label = 3;
}

message NetworkProfileMap {
  repeated NetworkProfileEntry entries = 1;
}

message LockState {
  bool enabled = 1;
  bool unlocked = 2;   // inside a timed-unlock window right now
}

message LockRequest {
  string action = 1;   // "enable" | "disable" | "unlock"
  string password = 2;
  int32 minutes = 3;   // unlock window (unlock only)
}

message HostsProtectionRequest {
  bool enabled = 1;
}

message BlockableService {
  string name = 1;
  bool blocked = 2;
  int32 domain_count = 3;
  string note = 4; // e.g. Defender-exclusion guidance on the telemetry preset
}

message ServiceStates {
  repeated BlockableService services = 1;
}

message ProfileList { repeated string names = 1; string active = 2; }
message ProfileRequest { string name = 1; }

message Schedule {
  string target = 1;        // domain or service name
  repeated int32 days = 2;  // 0=Mon .. 6=Sun
  string start = 3;         // "HH:mm"
  string end = 4;           // "HH:mm"
}
message ScheduleList { repeated Schedule schedules = 1; }

message ServiceToggleRequest { string service = 1; bool block = 2; }
