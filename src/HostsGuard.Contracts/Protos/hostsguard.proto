}

message RuleNameRequest { string name = 1; }
message RuleEnabledRequest { string name = 1; bool enabled = 2; }

message DohBlockRequest {
  repeated string exempt = 1; // the machine's own resolver IPs, never blocked
}

// ─── DNS control ─────────────────────────────────────────────────────────────

service DnsControl {
  rpc FlushCache(Empty) returns (Ack);
  rpc FlushCacheEntry(DnsCacheEntryRequest) returns (Ack);
  // DoH resolver intelligence (doh_resolvers.json): status + gated refresh.
  rpc GetDohStatus(Empty) returns (DohStatus);
  rpc GetIdnHomographStatus(Empty) returns (IdnHomographStatus);
  rpc Inspect(DomainRequest) returns (DnsInspectResult);
  rpc ListCache(DnsCacheRequest) returns (DnsCacheList);
  rpc RefreshDohIntelligence(DohRefreshRequest) returns (Ack);
  // Reverse-resolve remote IPs the forward-DNS cache didn't cover (PTR), and
  // persist every result so future connections to the same IP show the host
  // automatically. Returns the resolved (address, host) pairs.
  rpc ResolveHosts(ResolveHostsRequest) returns (ResolveHostsResult);
  // CNAME-cloak reactive blocking: block a first-party host that CNAMEs to a
  // blocked tracker (uses the ETW resolution chain; opt-in).
  rpc SetCnameCloak(CnameCloakRequest) returns (Ack);
  rpc SetIdnHomograph(IdnHomographRequest) returns (Ack);
  // Enumerate the exact adapters and current DHCP/static resolver state before
  // a transactional resolver change.
  rpc ListResolverAdapters(Empty) returns (ResolverAdapterList);
  rpc SetResolver(ResolverRequest) returns (Ack);
  // TLS SNI capture (NET-109): recover hostnames for HTTPS connections resolved
  // over DoH by reading the ClientHello SNI (driver-free raw socket). Opt-in;
  // ECH-encrypted SNI is noted as unavailable.
  rpc SetSniCapture(SniCaptureRequest) returns (Ack);
}

message SniCaptureRequest {
  bool enabled = 1;
}

message CnameCloakRequest {
  bool enabled = 1;
}

message DnsCacheRequest {
  int32 limit = 1;     // 0 = server default (500), max 2000
  string search = 2;   // substring match on cached name or DNS type
}

message DnsCacheEntryRequest {
  string name = 1;     // exact cache entry name to flush
}

message DnsCacheEntry {
  string name = 1;
  string type = 2;     // A / AAAA / CNAME / PTR / numeric fallback
  int32 data_length = 3;
  uint32 flags = 4;
  bool service_binding = 5; // SVCB/HTTPS RR; may carry ALPN/ECH parameters
  string privacy_role = 6;  // human-readable role for diagnostics
}

message DnsCacheList {
  repeated DnsCacheEntry entries = 1;
  bool available = 2;
  string message = 3;
}

message ResolveHostsRequest {
  repeated string addresses = 1;
}

message ResolvedHostEntry {
  string address = 1;
  string host = 2;       // "" when the IP has no resolvable name
}

message ResolveHostsResult {
  repeated ResolvedHostEntry hosts = 1;
}

message DohStatus {
  int32 resolver_ips = 1;   // built-in + learned
  int32 extra_ips = 2;      // learned beyond the built-in set
  string updated = 3;
  string source = 4;
  string sha256 = 5;
  bool blocking_active = 6; // HG_DoH_* rules currently exist
  bool quic_blocked = 7;    // HG_QUIC_UDP443 rule currently exists
  bool cname_cloak = 8;     // CNAME-cloak reactive blocking is armed
  bool sni_capture = 9;     // TLS SNI capture is running (NET-109)
  bool dns_encrypted_only = 10; // OS is in encrypted-DNS-only posture (NET-112 warn)
  int32 https_records = 11; // HTTPS RR rows visible in Windows DNS cache
  int32 svcb_records = 12;  // SVCB RR rows visible in Windows DNS cache
  int32 ech_unavailable_observations = 13; // TLS ClientHello observations with ECH
  string ech_state = 14;    // stable posture token
  string ech_summary = 15;  // user-facing explanation
  string ech_remediation = 16; // safe next step; never enables blocking
  bool service_binding_observed = 17;
  bool ech_unobservable = 18;
  bool dnr_enabled = 19; // NET-173: Windows DNR auto-discovers network encrypted resolvers
}

message DohRefreshRequest {
  string url = 1;      // optional remote list; requires sha256 when set
  string sha256 = 2;   // expected hash of the remote payload
}

message ResolverRequest {
  repeated string servers = 1; // empty = reset to DHCP default
  repeated string adapter_ids = 2; // empty preserves legacy all-eligible behavior
  string probe_host = 3; // optional; defaults to example.com
}

message ResolverAdapterInfo {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_up = 4;
  bool is_vpn = 5;
  bool uses_dhcp = 6;
  repeated string configured_servers = 7;
  repeated string effective_servers = 8;
}

message ResolverAdapterList {
  repeated ResolverAdapterInfo adapters = 1;
}

message DnsRecord {
  string type = 1;    // A / AAAA / CNAME
  string name = 2;
  int32 ttl = 3;
  string value = 4;
}

message DnsInspectResult {
  repeated DnsRecord records = 1;
  int32 latency_ms = 2;
  bool blocked = 3;
  string ech_state = 4;
  string ech_summary = 5;
  string ech_remediation = 6;
  int32 https_records = 7;
  int32 svcb_records = 8;
  bool service_binding_observed = 9;
  repeated ServiceBindingRecord service_bindings = 10;
  bool service_binding_query_available = 11;
  string service_binding_message = 12;
  bool ech_advertised = 13; // ECHConfig was present in queried HTTPS/SVCB data
  bool ech_observed = 14;   // ECH was observed locally; not attributable to this domain
  int32 ech_observation_count = 15; // global service-lifetime observations
}

message ServiceBindingRecord {
  string dns_type = 1; // HTTPS or SVCB
  uint32 priority = 2;
  string target = 3;
  bool alias_mode = 4; // priority 0; target aliases to another owner name
  repeated ServiceBindingParameter parameters = 5;
  bool ech_advertised = 6;
  bool malformed = 7;
  string diagnostic = 8;
  string owner_name = 9;
  uint32 ttl_seconds = 10;
}

message ServiceBindingParameter {
  uint32 key = 1;
  string name = 2;  // mandatory/alpn/no-default-alpn/port/ipv4hint/ech/ipv6hint/dohpath/keyNN
  string value = 3; // bounded decoded value; opaque values are bounded hex
}

message IdnHomographRequest {
  bool enabled = 1;
}

message IdnHomographStatus {
  bool enabled = 1;       // opt-in; false by default
  int32 corpus_size = 2;  // bounded whitelist + recent-domain comparison corpus
  string standard = 3;    // Unicode/UTS #39 data version used by the detector
}

// ─── Monitoring (server-streaming live feeds) ────────────────────────────────

service Monitoring {
  rpc ClearConnectionHistory(Empty) returns (Ack);
  rpc WatchDns(Empty) returns (stream DnsEvent);
  rpc WatchConnections(Empty) returns (stream ConnectionEvent);
  rpc WatchEvents(Empty) returns (stream ActivityEvent);
  // Persistent, retention-bounded connection history (NET-070). Recorded
  // server-side on first sighting of a connection tuple; nothing leaves the
  // machine.
  rpc GetConnectionHistory(ConnectionHistoryRequest) returns (ConnectionHistoryList);
  // Persistent event ledger: every structured block/allow/firewall/policy event
  // the service recorded, with paging, filters, and optional redaction for export.
  rpc ListEvents(EventLogRequest) returns (EventLogList);
  // Effective inbound exposure of local TCP/UDP listeners, including owning
  // identity, bind scope, active firewall profiles, and matching-rule coverage.
  rpc ListListeners(Empty) returns (ListenerExposureList);
  // Stateful in-app alert inbox (NET-153): low-volume unread/read alerts with
  // per-type surface-vs-log-only settings. This is not the toast stack.
  rpc ListAlerts(AlertRequest) returns (AlertList);
  rpc AckAlert(AlertAckRequest) returns (Ack);
  rpc ListAlertTypes(Empty) returns (AlertTypeList);
  rpc SetAlertType(AlertTypeRequest) returns (Ack);
  // Per-app bandwidth timeline (NET-070): ETW kernel network byte counters
  // aggregated per process per minute. Series are zero-filled and aligned,
  // oldest → newest, one bucket per minute.
  rpc GetAppBandwidth(BandwidthRequest) returns (AppBandwidthList);
  // History retention policy (default 30 days; prune runs opportunistically).
  rpc GetHistorySettings(Empty) returns (HistorySettings);
  // Daily app x domain byte rollups (NET-158), persisted under the history
  // retention window for GlassWire-style usage review.
  rpc GetUsageRollups(UsageRollupRequest) returns (UsageRollupList);
  // Optional local usage-budget alerts (NET-175). These are alert-only: they do
  // not shape, block, or alter firewall/hosts posture.
  rpc GetUsageQuotaRules(Empty) returns (UsageQuotaRuleList);
  rpc SetUsageQuotaRule(UsageQuotaRule) returns (Ack);
  rpc DeleteUsageQuotaRule(UsageQuotaRule) returns (Ack);
  rpc ResetUsageQuotaHistory(Empty) returns (Ack);
  rpc ExportUsageQuotaHistory(UsageQuotaHistoryRequest) returns (UsageQuotaHistoryExport);
  // Metadata-only traffic profiles (NET-176): redacted connection/event rows
  // plus protocol/port summaries and Wireshark display-filter hints. This is
  // not PCAP and never includes packet payloads.
  rpc ExportTrafficProfile(TrafficProfileRequest) returns (TrafficProfileExport);
  rpc SetHistorySettings(HistorySettings) returns (Ack);
}

message ListenerExposure {
  string protocol = 1;        // TCP | UDP
  string local_address = 2;   // IPv4 or IPv6 bind address
  int32 local_port = 3;
  string process = 4;
  int32 pid = 5;
  string service = 6;         // Windows service attribution, when available
  string package = 7;         // app package identity, when available
  string bind_scope = 8;      // loopback | local | any
  string active_profiles = 9; // comma-separated Domain,Private,Public
  string coverage = 10;       // effective inbound firewall coverage
  string risk = 11;           // low | medium | high
  string reason = 12;         // concise explanation of effective exposure
}

message ListenerExposureList {
  repeated ListenerExposure listeners = 1;
}

message ConnectionHistoryRequest {
  int32 limit = 1;      // 0 = server default, max 2000
  string search = 2;    // substring match on process / host / remote / country / status
  string since = 3;     // ISO-8601 floor (optional)
  string until = 4;     // ISO-8601 ceiling (optional)
  string process = 5;   // app/process substring
  string host = 6;      // resolved host/domain substring
  string remote_addr = 7; // remote IP substring
  string fw_status = 8; // firewall/status substring
  string protocol = 9;  // TCP/UDP exact match
  int32 offset = 10;    // zero-based page offset
}

message ConnectionHistoryRow {
  string ts = 1;
  string process = 2;
  int32 pid = 3;
  string protocol = 4;
  string remote_addr = 5;
  int32 remote_port = 6;
  string country = 7;
  string fw_status = 8; // "", "THREAT", …
  string host = 9;
  string asn = 10;      // "AS#### Org" from the offline DB-IP ASN MMDB; "" when unknown
}

message ConnectionHistoryList {
  repeated ConnectionHistoryRow rows = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
  int32 retention_days = 5;
}

message EventLogRequest {
  int32 limit = 1;       // 0 = server default, max 2000
  int32 offset = 2;      // zero-based page offset
  string search = 3;     // substring match on action/domain/process/details/reason
  string since = 4;      // ISO-8601 floor (optional)
  string until = 5;      // ISO-8601 ceiling (optional)
  string action = 6;     // exact action filter
  string reason = 7;     // exact canonical reason filter
  string domain = 8;     // substring match on domain/subject
  string process = 9;    // substring match on process
  string category = 10;  // taxonomy bucket: hosts/firewall/consent/dns/lists/policy/defender/support/other
  bool redact = 11;      // true = redact domain/process/details for export/support use
}

message EventLogEntry {
  int64 id = 1;
  string ts = 2;
  string domain = 3;
  string action = 4;
  string process = 5;
  string details = 6;
  string reason = 7;
  string category = 8;
}

message EventLogList {
  repeated EventLogEntry entries = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
  bool redacted = 5;
}

message AlertRequest {
  int32 limit = 1;       // 0 = server default, max 2000
  int32 offset = 2;
  bool include_read = 3; // false = unread only
  bool include_log_only = 4; // false = hide log-only alert types
  string type = 5;       // optional exact alert type
}

message AlertEntry {
  int64 id = 1;
  string created = 2;
  string updated = 3;
  string type = 4;
  string severity = 5;   // info | warning | critical
  string title = 6;
  string subject = 7;
  string details = 8;
  string action = 9;
  string process = 10;
  bool is_read = 11;
  bool surfaced = 12;
  DgaEvidence dga_evidence = 13; // populated only for suspicious_domain alerts
}

message DgaEvidence {
  string version = 1;
  string registrable_label = 2;
  int32 label_length = 3;
  double entropy = 4;
  double entropy_threshold = 5;
  double vowel_ratio = 6;
  double vowel_ratio_threshold = 7;
  double digit_ratio = 8;
  double digit_ratio_threshold = 9;
  int32 max_consonant_run = 10;
  int32 consonant_run_threshold = 11;
  double score = 12;
  double decision_threshold = 13;
  bool is_algorithmic = 14;
  string reason = 15;
}

message AlertList {
  repeated AlertEntry entries = 1;
  int32 total = 2;
  int32 unread = 3;
}

message AlertAckRequest {
  repeated int64 ids = 1;
  bool all = 2;          // ack all unread alerts, optionally scoped by type
  string type = 3;
}

message AlertTypeEntry {
  string type = 1;
  string label = 2;
  bool surface = 3;
  int32 unread = 4;
}

message AlertTypeList {
  repeated AlertTypeEntry types = 1;
}

message AlertTypeRequest {
  string type = 1;
  bool surface = 2;
}

message BandwidthRequest {
  int32 minutes = 1;    // window width; 0 = server default (60)
  int32 top = 2;        // max processes; 0 = server default (5)
}

message AppBandwidthSeries {
  string process = 1;
  repeated int64 bytes = 2;   // per-minute sent+recv, zero-filled, oldest → newest
  int64 total_sent = 3;
  int64 total_recv = 4;
}

message AppBandwidthList {
  repeated AppBandwidthSeries series = 1;
  bool counters_active = 2;   // ETW byte counters are running (elevation-gated)
}

message HistorySettings {
  int32 retention_days = 1;   // clamp 1..365
}

message UsageRollupRequest {
  int32 days = 1;       // 0 = server default (30), max 365
  int32 limit = 2;      // 0 = server default (200), max 2000
  string search = 3;    // substring match on process/domain
  string process = 4;   // optional process substring
  string domain = 5;    // optional domain substring
}

message UsageRollupEntry {
  string day = 1;       // yyyy-MM-dd
  string process = 2;
  string domain = 3;
  int64 sent = 4;
  int64 recv = 5;
  int64 total = 6;
}

message UsageRollupList {
  repeated UsageRollupEntry entries = 1;
  int32 retention_days = 2;
}

message UsageQuotaRule {
  int64 id = 1;
  string scope = 2;       // app | domain
  string match = 3;       // process name or exact domain
  int64 limit_bytes = 4;
  int32 window_days = 5;  // 1..365
  bool enabled = 6;
  int64 used_bytes = 7;   // current usage in the rule window
  int64 last_alerted_bytes = 8;
  string last_alerted_at = 9;
  bool block_on_exceed = 10;  // NET-172: enforce, not just alert (default off)
  bool block_active = 11;     // an enforcement block is currently applied
  string blocked_since = 12;  // ISO timestamp of the active block; "" when none
}

message UsageQuotaRuleList {
  repeated UsageQuotaRule rules = 1;
}

message UsageQuotaHistoryRequest {
  int32 days = 1;      // 0 = server default (30), max 365
  string scope = 2;    // optional app | domain
  string match = 3;    // optional exact process/domain within scope
  string format = 4;   // csv | json
}

message UsageQuotaHistoryExport {
  string format = 1;
  string content = 2;
}

message TrafficProfileRequest {
  string since = 1;     // optional ISO-8601 floor
  string until = 2;     // optional ISO-8601 ceiling
  string process = 3;   // optional app/process substring
  string action = 4;    // optional event action exact match
  string protocol = 5;  // optional TCP/UDP exact match for connection rows
  int32 limit = 6;      // 0 = server default, max 10000 connections / 2000 events
  string format = 7;    // json | csv
}

message TrafficProfileExport {
  string format = 1;
  string content = 2;
  int32 connection_count = 3;
  int32 event_count = 4;
  bool redacted = 5;
  string no_payload_guarantee = 6;
}

message DnsEvent {
  string domain = 1;
  string process = 2;
  int32 pid = 3;
  bool blocked = 4;
  google.protobuf.Timestamp ts = 5;
  // Blocklist-intelligence membership (see ActivityRow.blocklists).
  repeated string blocklists = 6;
  // Authoritative hidden state (exact-domain or hidden-root); the client drops
  // these live events unless Show hidden is on, so hides never bounce back.
  bool hidden = 7;
}

message HideDomainsRequest {
  repeated string domains = 1;
}

message ConnectionEvent {
  string protocol = 1;
  string local_addr = 2;
  int32 local_port = 3;
  string remote_addr = 4;
  int32 remote_port = 5;
  string host = 6;
  string process = 7;
  int32 pid = 8;
  string state = 9;
  string country = 10;
  string category = 11;
  string fw_status = 12; // "", "HOSTS", "FW BLOCK", "THREAT"
  google.protobuf.Timestamp ts = 13;
  string service = 14;   // owning SCM service display name(s) (NET-073); "" for plain apps
  string asn = 15;       // "AS#### Org" from the offline DB-IP ASN MMDB; "" when unknown
}

message ActivityEvent {
  google.protobuf.Timestamp ts = 1;
  string domain = 2;
  string action = 3;
  string process = 4;
  string details = 5;
  string reason = 6;
}

// ─── Consent loop (WFC-parity notify/learning) ───────────────────────────────

service Consent {
  // Live stream of pending decision requests (Notify mode pushes here).
  rpc WatchDecisions(Empty) returns (stream ConnectionDecisionRequest);
  // Answer a pending request; re-decide from history by leaving id empty.
  rpc Decide(ConnectionDecision) returns (Ack);
  // Filtering mode: "normal" enforces silently, "notify" prompts on unruled
  // connections, "learning" auto-allows and records. Switching into
  // notify/learning arms detection (audit + default-outbound Block, prior
  // posture saved); switching back to normal restores the saved posture.
  rpc GetMode(Empty) returns (FilteringMode);
  rpc SetMode(FilteringMode) returns (Ack);
  rpc GetDecisionHistory(HistoryRequest) returns (DecisionHistory);
  // Known-safe baseline (NET-068): inspect the curated OS-essential binaries
  // that never prompt, and proactively write their allow rules.
  rpc GetBaseline(Empty) returns (BaselineList);
  rpc ApplyBaseline(Empty) returns (Ack);
  // "Decide later" review (NET-074): Learning mode auto-allows and records —
  // these RPCs list the recorded auto-decisions (HG_Learn_ rules) and let the
  // user batch-promote them to permanent consent rules, reverse them to
  // blocks, or discard them (back to prompting).
  rpc GetLearned(Empty) returns (LearnedList);
  rpc ReviewLearned(LearnedReviewRequest) returns (Ack);
  // Child-process auto-allow (NET-093, opt-in): when on, a direct child of an
  // app that already has an allow rule inherits that allow for a bounded TTL
  // instead of prompting. Off preserves deny-by-default.
  rpc SetChildInherit(ChildInheritRequest) returns (Ack);
  // Inbound-connection consent (NET-104, opt-in): prompt on unruled inbound
  // connections too. Off by default to avoid unsolicited-inbound prompt noise.
  rpc SetInboundConsent(InboundConsentRequest) returns (Ack);
  // Trusted publishers (NET-113): review/replace the set of Authenticode
  // publisher CNs whose signed binaries auto-allow without a prompt.
  rpc GetTrustedPublishers(Empty) returns (PublisherList);
  rpc SetTrustedPublishers(PublisherList) returns (Ack);
  // Trusted folders (NET-117): review/replace the folders whose binaries
  // auto-allow without a prompt.
  rpc GetTrustedFolders(Empty) returns (FolderList);
  rpc SetTrustedFolders(FolderList) returns (Ack);
}

message PublisherList {
  repeated string publishers = 1;
}

message FolderList {
  repeated string folders = 1;
}

message ChildInheritRequest {
  bool enabled = 1;
}

message InboundConsentRequest {
  bool enabled = 1;
}

message LearnedEntry {
  string rule_name = 1;
  string application = 2;
  string direction = 3;   // "In" | "Out"
  string service_name = 4; // SCM scope when present
}

message LearnedList {
  repeated LearnedEntry entries = 1;
}

message LearnedReviewAction {
  string rule_name = 1;
  string action = 2;      // "promote" | "block" | "discard"
}

message LearnedReviewRequest {
  repeated LearnedReviewAction actions = 1;
}

message BaselineItem {
  string file_name = 1;
  string description = 2;
  bool present = 3;   // the binary exists on this machine
}

message BaselineList {
  repeated BaselineItem items = 1;
}

message ConnectionDecisionRequest {
  string id = 1;              // pending-cache key; expires server-side
  string application = 2;     // DOS path
  string direction = 3;       // "In" | "Out"
  string remote_address = 4;
  int32 remote_port = 5;
  string protocol = 6;
  int32 process_id = 7;
  google.protobuf.Timestamp ts = 8;
  // Decision-quality enrichment (best-effort; blank/false when unavailable).
  string country = 9;         // ISO country code of the remote IP (GeoIP)
  bool threat = 10;           // remote IP is on the threat-intel overlay
  string signer = 11;         // Authenticode signer subject of the application
  // svchost attribution (NET-073). service = display text; service_key = the
  // SCM short name when exactly ONE service owns the PID (else blank — a
  // per-service rule would be ambiguous).
  string service = 12;
  string service_key = 13;
  // Command-line-aware interpreter prompts (NET-156). Present only for known
  // interpreters such as node/python/pwsh/java/wscript when a script/module was
  // extracted from the live process command line.
  string command_line = 14;       // display text, e.g. "node C:\dev\app\index.js"
  string script_path = 15;        // extracted script/module/jar identity
  string script_binding_key = 16; // opaque app+script key echoed in decisions
  // WFP 5157/5152 provenance (Windows 11/Server 2022 emits filter origin and
  // interface index; older builds leave these blank/zero).
  string filter_runtime_id = 17;
  string filter_origin = 18;
  string layer_name = 19;
  string layer_runtime_id = 20;
  int32 interface_index = 21;
  string interface_name = 22;
  string filter_owner = 23;       // "HostsGuard rule" | "Windows default filter" | "External firewall rule"
  bool external_filter = 24;      // true when filter_origin is a non-HG, non-default firewall rule
}

message ConnectionDecision {
  string id = 1;              // echo of the request id ("" = re-decide)
  string application = 2;
  string direction = 3;
  string remote_address = 4;
  string protocol = 5;
  string verdict = 6;         // "allow" | "block"
  bool permanent = 7;         // legacy: permanent vs once-rule (overridden by duration)
  bool scope_remote = 8;      // restrict the rule to remote_address
  int32 remote_port = 9;      // echoed from the request, used when scope_port is set
  bool scope_port = 10;       // restrict the rule to remote_port (implies TCP/UDP protocol)
  bool scope_protocol = 11;   // restrict the rule to protocol
  string duration = 12;       // "once" | "1h" | "session" | "always" (blank = legacy permanent flag)
  bool scope_service = 13;    // restrict the rule to the owning service (NET-073)
  string service_key = 14;    // echoed request.service_key (SCM short name)
  // Prompt-burst blanket decision (NET-099): apply this verdict to EVERY pending
  // prompt from the same application as one whole-app rule, clearing the queue.
  bool apply_to_app = 15;
  // Trust-by-publisher (NET-113): remember the app's Authenticode publisher so
  // any binary signed by it auto-allows without prompting.
  bool trust_publisher = 16;
  // Trust-by-folder (NET-117): remember the app's parent folder so any binary
  // under it auto-allows (portable-app / whole-install-dir trust).
  bool trust_folder = 17;
  // Command-line-aware interpreter binding (NET-156): bind this decision to
  // exe+script in the broker. Allows are emitted as remote/port-scoped WF rules
  // so Windows Firewall never broadly allows every script under the interpreter.
  bool scope_command_line = 18;
  string command_line = 19;
  string script_path = 20;
  string script_binding_key = 21;
}

message FilteringMode {
  string mode = 1;            // "normal" | "notify" | "learning"
  bool detection_armed = 2;   // audit + watch active (read-only, set by server)
  bool child_inherit = 3;     // child-process auto-allow is on (read-only, set by server)
  // Time-boxed Learning auto-lock (NET-101): on SetMode(learning) a positive
  // value learns for that many minutes then auto-reverts to Normal. On GetMode
  // it's the minutes remaining in the current learning window (0 = unbounded).
  int32 learn_minutes = 4;
  bool inbound_consent = 5;   // inbound-connection consent is on (read-only, set by server)
}

message HistoryRequest {
  int32 limit = 1;            // 0 = server default
}

message DecisionEntry {
  string decided_at = 1;
  string application = 2;
  string direction = 3;
  string remote_address = 4;
  string protocol = 5;
  string verdict = 6;         // "allow" | "block" | "timeout" | "learn"
  bool permanent = 7;
  string filter_runtime_id = 8;
  string filter_origin = 9;
  string layer_name = 10;
  string layer_runtime_id = 11;
  int32 interface_index = 12;
  string interface_name = 13;
  string filter_owner = 14;
  bool external_filter = 15;
}

message DecisionHistory {
  repeated DecisionEntry entries = 1;
}

// ─── Policy / profiles / scheduling ──────────────────────────────────────────

service Policy {
  rpc ListProfiles(Empty) returns (ProfileList);
  rpc SwitchProfile(ProfileRequest) returns (Ack);
  rpc SetSchedules(ScheduleList) returns (Ack);
  rpc GetSchedules(Empty) returns (ScheduleList);
  rpc ToggleService(ServiceToggleRequest) returns (Ack);
  // One-click service sets + the Windows telemetry preset, with block state.
  rpc ListServices(Empty) returns (ServiceStates);
  // Named rule-set profiles: snapshot, switch (with hosts reconcile), delete.
  rpc SaveProfile(ProfileRequest) returns (Ack);
  rpc DeleteProfile(ProfileRequest) returns (Ack);
  // Settings/rule lock (NET-079): arm/disarm with a password and timed-unlock.
  // When armed, mode/posture/rule mutations are refused until unlocked.
  rpc GetLockState(Empty) returns (LockState);
  rpc SetLock(LockRequest) returns (Ack);
  rpc Unlock(LockRequest) returns (Ack);
  // Hosts-file write protection (NET-079): enforce/relax the SYSTEM+Admins-only
  // DACL that keeps third parties from writing the hosts file.
  rpc SetHostsProtection(HostsProtectionRequest) returns (Ack);
  // Automatic network-profile switching (NET-083): fingerprint the joined
  // network (gateway MAC) and auto-activate the mapped profile.
  rpc GetCurrentNetwork(Empty) returns (CurrentNetwork);
  rpc GetNetworkProfiles(Empty) returns (NetworkProfileMap);
  rpc SetNetworkProfile(NetworkProfileEntry) returns (Ack);
  // Full portable-policy export/import (NET-089): one versioned JSON document
  // covering managed domains, HG_ firewall rules, schedules, profiles, the
  // settings lock, network profiles, and allow/blocklist subscriptions. Import
  // reconstructs the policy on a clean machine; the round-trip is idempotent.
  rpc ExportPolicy(Empty) returns (PolicyDocument);
  rpc PreviewPolicyImport(ImportPolicyRequest) returns (ImportPolicyResult);
  rpc ImportPolicy(ImportPolicyRequest) returns (ImportPolicyResult);
  rpc RestorePolicyCheckpoint(Empty) returns (ImportPolicyResult);
  rpc ListPolicySubscriptions(Empty) returns (PolicySubscriptionList);
  rpc SavePolicySubscription(PolicySubscriptionRequest) returns (Ack);
  rpc DeletePolicySubscription(PolicySubscriptionRequest) returns (Ack);
  rpc PreviewPolicySubscription(PolicySubscriptionRequest) returns (ImportPolicyResult);
  rpc ApplyPolicySubscription(PolicySubscriptionRequest) returns (ImportPolicyResult);
  rpc RefreshPolicySubscriptions(Empty) returns (ImportPolicyResult);
  rpc RollbackPolicySubscription(PolicySubscriptionRequest) returns (ImportPolicyResult);
}

message PolicyDocument {
  string json = 1;   // the versioned portable-policy JSON
}

message ImportPolicyRequest {
  string json = 1;
  bool merge = 2;    // reserved; import currently reconstructs (idempotent merge)
  bool preview = 3;  // compute diff only; no mutation or checkpoint
}

message ImportPolicyResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  repeated string summary = 4;   // per-section applied counts (human-readable)
  bool preview = 5;
  int64 added = 6;
  int64 changed = 7;
  int64 removed = 8;
  int64 checkpoint_id = 9;
}

message PolicySubscription {
  int64 id = 1;
  string name = 2;
  string url = 3;
  bool enabled = 4;
  bool auto_apply = 5;
  string pin_hash = 6;
  string last_hash = 7;
  int64 last_checkpoint_id = 8;
  string last_applied_at = 9;
  string last_preview_summary = 10;
  string last_error = 11;
  string last_error_at = 12;
  string created = 13;
  string updated = 14;
}

message PolicySubscriptionList {
  repeated PolicySubscription subscriptions = 1;
}

message PolicySubscriptionRequest {
  int64 id = 1;
  string name = 2;
  string url = 3;
  bool enabled = 4;
  bool auto_apply = 5;
  string pin_hash = 6;
  bool pin_current_hash = 7;
}

message CurrentNetwork {
  string fingerprint = 1;
  string label = 2;      // the interface/network name
  bool online = 3;
}

message NetworkProfileEntry {
  string fingerprint = 1;
  string profile = 2;    // "" removes the mapping
  string label = 3;
}

message NetworkProfileMap {
  repeated NetworkProfileEntry entries = 1;
}

message LockState {
  bool enabled = 1;
  bool unlocked = 2;   // inside a timed-unlock window right now
}

message LockRequest {
  string action = 1;   // "enable" | "disable" | "unlock"
  string password = 2;
  int32 minutes = 3;   // unlock window (unlock only)
}

message HostsProtectionRequest {
  bool enabled = 1;
}

message BlockableService {
  string name = 1;
  bool blocked = 2;
  int32 domain_count = 3;
  string note = 4; // e.g. Defender-exclusion guidance on the telemetry preset
}

message ServiceStates {
  repeated BlockableService services = 1;
}

message ProfileList { repeated string names = 1; string active = 2; }
message ProfileRequest { string name = 1; }

message Schedule {
  string target = 1;        // domain or service name
  repeated int32 days = 2;  // 0=Mon .. 6=Sun
  string start = 3;         // "HH:mm"
  string end = 4;           // "HH:mm"
}
message ScheduleList { repeated Schedule schedules = 1; }

message ServiceToggleRequest { string service = 1; bool block = 2; }
