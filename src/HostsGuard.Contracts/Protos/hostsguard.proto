}

message DecisionExplainRequest {
  string target = 1;       // generic domain/IP/process/path from CLI/UI input
  string domain = 2;
  string remote_addr = 3;
  int32 remote_port = 4;
  string protocol = 5;     // "TCP" | "UDP" | "Any"; empty = Any
  string process = 6;      // display name when full path is unavailable
  string program_path = 7;
  string direction = 8;    // "Out" | "In"; empty = Out
  string signer = 9;       // optional Authenticode subject for publisher trust
  string service = 10;     // SCM service key/display when known
  string package_family_name = 11; // MSIX/UWP package family name when known
  string package_sid = 12;         // app-container SID when known
}

message DecisionStep {
  int32 order = 1;
  string layer = 2;
  string outcome = 3;      // Block | Allow | Observed | Unknown
  string owner = 4;        // rule/source/profile/trust entry
  string detail = 5;
  string next_action = 6;
}

message DecisionExplanation {
  string verdict = 1;          // Blocked | Allowed | Unknown
  string summary = 2;
  string next_safe_action = 3;
  repeated DecisionStep steps = 4;
}

message FirewallPosture {
  bool available = 1;   // firewall engine attached and readable
  bool lockdown = 2;    // every profile's default outbound action is Block
  repeated ProfilePosture profiles = 3;
}

message ProfilePosture {
  string name = 1;      // "Domain" | "Private" | "Public"
  bool enabled = 2;
  bool outbound_block = 3;
}

message OutboundRequest {
  bool block = 1;
}

message SecureRulesRequest {
  bool enabled = 1;
}

message SecureRulesStatus {
  bool enabled = 1;
  int32 tracked = 2;   // HG_ rules under protection
}

message RebindCandidate {
  string path = 1;
  int32 score = 2;      // 0-100 identity-match confidence
  string reasons = 3;   // e.g. "same SHA-256; same signer"
}

message RebindSuggestions {
  string old_path = 1;
  bool ambiguous = 2;   // top two scores within 8 points — user must choose
  repeated RebindCandidate candidates = 3;
}

message RebindRequest {
  string name = 1;
  string new_program = 2;
}

message FirewallIpRequest {
  string address = 1;   // IP / CIDR / range
  string direction = 2; // "Outbound" | "Inbound"
}

message FirewallProgramRequest {
  string program_path = 1;
  string direction = 2;
}

message FirewallRule {
  string name = 1;
  string direction = 2; // "In" | "Out"
  string action = 3;    // "Block" | "Allow"
  bool enabled = 4;
  string remote_addr = 5;
  string protocol = 6;
  string program = 7;
  string source = 8;    // "hostsguard" | "system"
  bool orphaned = 9;    // program path no longer exists on disk
  bool drifted = 10;    // HG_ rule tracked in the DB but missing live (or vice versa)
  string remote_ports = 11; // "Any" or a COM port list, e.g. "853" (TCP/UDP only)
  string service_name = 12; // SCM short name the rule is scoped to (NET-073); "" = whole program
  bool adopted = 13;        // existing WF rule HostsGuard adopted into its view (NET-095)
  string drift_status = 14; // "", "added", "changed", "vanished", or "missing"
  string drift_detail = 15; // compact report-only diff detail
  string first_seen = 16;   // ISO timestamp from the full-firewall baseline
  string last_seen = 17;    // ISO timestamp from the full-firewall baseline
  string changed_at = 18;   // ISO timestamp of latest detected drift
  string local_ports = 19;  // "Any" or a COM local-port list, used by inbound service blocks
  string interfaces = 20;   // "Any" or comma-separated Windows interface aliases
  string package_family_name = 21; // MSIX/UWP package family name when this is a package rule
  string package_sid = 22;         // app-container SID used by INetFwRule3.LocalAppPackageId
  string package_display_name = 23;
  string package_full_name = 24;
  string package_binaries = 25;    // semicolon-separated binary paths returned by NetworkIsolation
}

message FirewallRuleList {
  repeated FirewallRule rules = 1;
}

message FirewallInterface {
  string alias = 1;
  string description = 2;
  bool is_up = 3;
  string interface_type = 4;
}

message FirewallInterfaceList {
  repeated FirewallInterface interfaces = 1;
}

message FirewallRuleAnalysisRequest {
  string kind = 1;             // optional exact finding-kind filter
  string remediation = 2;      // optional exact remediation filter
  string search = 3;           // rule/reason substring
  bool cleanup_eligible_only = 4;
}

message FirewallRuleAnalysisFinding {
  string kind = 1;
  string rule_name = 2;
  string related_rule_name = 3;
  string canonical_fingerprint = 4;
  string reason = 5;
  string remediation = 6;
  bool cleanup_eligible = 7;   // exact duplicate + HG_ ownership only
}

message FirewallRuleAnalysisResult {
  string analysis_hash = 1;    // SHA-256 of normalized live rules + policy context
  string local_policy_modify_state = 2;
  repeated string active_profiles = 3;
  repeated FirewallRuleAnalysisFinding findings = 4;
  int32 rules_analyzed = 5;
}

message FirewallRuleCleanupRequest {
  repeated string selected_names = 1;
  string analysis_hash = 2;
  string preview_hash = 3; // required when preview=false
  bool preview = 4;
}

message FirewallRuleCleanupResult {
  bool ok = 1;
  bool preview = 2;
  string message = 3;
  string error_code = 4;
  string analysis_hash = 5;
  string preview_hash = 6;
  repeated string selected_names = 7;
  repeated string rejected_names = 8;
  int32 deleted = 9;
}

message AppPackage {
  string package_family_name = 1;
  string package_sid = 2;
  string display_name = 3;
  string package_full_name = 4;
  string binaries = 5;
}

message AppPackageList {
  repeated AppPackage packages = 1;
}

message AdoptResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int32 adopted = 4;   // newly-adopted rules this run
  int32 total = 5;     // existing non-HG_ WF rules seen
}

message HostsAdoptionRequest {
  bool enabled = 1;    // adopt hand-added hosts entries automatically on external change
}

message HostsAdoptionStatus {
  bool enabled = 1;         // automatic on-external-change adoption is on
  string last_run = 2;      // ISO timestamp of the last adoption pass; "" = never
  string last_result = 3;   // human summary of the last pass
  int32 unadopted = 4;      // sink-blocked hosts domains not yet in the managed DB
}

message RuleGroupAssignment {
  string rule_name = 1;
  string group = 2;     // "" removes the rule from all groups
}

message RuleGroupToggle {
  string group = 1;
  bool enabled = 2;
}

message RuleGroupInfo {
  string name = 1;
  repeated string rules = 2;
  int32 enabled_count = 3;  // rules currently enabled
  int32 total = 4;
}

message RuleGroupList {
