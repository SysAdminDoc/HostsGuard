syntax = "proto3";

// HostsGuard IPC contract, v1. Shared by the elevated service (server) and the
// unelevated UI + CLI (clients). Transport: gRPC over an ACL'd named pipe.
// Streaming RPCs deliver live DNS/connection/event feeds without polling.
package hostsguard.v1;

option csharp_namespace = "HostsGuard.Contracts";

import "google/protobuf/timestamp.proto";

// ─── Common ──────────────────────────────────────────────────────────────────

message Empty {}

message Ack {
  bool ok = 1;
  string message = 2;      // human-readable detail (never secrets)
  string error_code = 3;   // machine code, e.g. hostsguard.error.v1/invalid_domain
}

// ─── Diagnostics / health ────────────────────────────────────────────────────

service Diagnostics {
  rpc GetStatus(Empty) returns (ServiceStatus);
  // Writes a redacted support bundle zip under the service data dir; the
  // resulting path is returned in Ack.message. Never contains tokens/secrets.
  rpc ExportSupportBundle(SupportBundleRequest) returns (Ack);
  // Windows Defender integration: exclusion state + hosts-revert heuristic.
  rpc GetDefenderStatus(Empty) returns (DefenderStatus);
  // NET-187 SHA-256-verified self-update (no code signing, per project policy):
  // check the release feed, stage a hash-verified installer, apply on restart.
  rpc GetUpdateStatus(Empty) returns (UpdateStatus);
  rpc StageUpdate(StageUpdateRequest) returns (Ack);
  // Read-only comparison of current per-user WinINET and machine WinHTTP
  // proxy/PAC state against the last explicitly accepted baseline.
  rpc InspectProxyBaseline(Empty) returns (ProxyBaselineReport);
  // Accepts the current observed state without changing any Windows setting.
  rpc AcceptProxyBaseline(Empty) returns (Ack);
}

message ProxyBaselineEntry {
  string scope = 1;          // "WinINET" or "WinHTTP"
  string sid = 2;            // user SID for WinINET; empty for machine state
  string setting = 3;        // stable setting key, e.g. ProxyServer
  bool baseline_present = 4;
  string baseline_value = 5; // display-safe value supplied by the service
  bool current_present = 6;
  string current_value = 7;  // display-safe value supplied by the service
  bool changed = 8;
}

message ProxyBaselineReport {
  repeated ProxyBaselineEntry entries = 1;
  bool baseline_exists = 2;
  bool changed = 3;
  string checked_at = 4;
  string message = 5;
}

// Coherent local recovery points for the service-owned SQLite database, hosts
// state, and non-secret ProgramData configuration. Snapshot identifiers are
// opaque; manifests and restore previews never expose secret values.
service Recovery {
  rpc CreateFullStateSnapshot(Empty) returns (FullStateSnapshot);
  rpc ListFullStateSnapshots(Empty) returns (FullStateSnapshotList);
  rpc PreviewFullStateRestore(FullStateSnapshotRef) returns (FullStateRestorePreview);
  rpc RestoreFullStateSnapshot(FullStateRestoreRequest) returns (Ack);
}

message FullStateSnapshotRef {
  string snapshot_id = 1; // opaque identifier returned by ListFullStateSnapshots
}

message FullStateSnapshot {
  string snapshot_id = 1;
  string created = 2;
  string app_version = 3;
  int32 schema_version = 4;
  string sha256 = 5;       // lowercase SHA-256 of the immutable snapshot package
  int64 size_bytes = 6;
  bool verified = 7;       // manifest and every component hash verified by service
  repeated string components = 8; // fixed component names/counts; never values/secrets
}

message FullStateSnapshotList {
  repeated FullStateSnapshot snapshots = 1;
}

message FullStateRestorePreview {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  string snapshot_id = 4;
  string sha256 = 5;       // bind RestoreFullStateSnapshot to this verified package
  string app_version = 6;
  int32 schema_version = 7;
  repeated string changes = 8; // redacted section-level counts and posture changes
}

message FullStateRestoreRequest {
  string snapshot_id = 1;
  string expected_sha256 = 2; // required guard against replacement after preview
  bool create_pre_restore = 3; // clients set true; service may reject false
}

message UpdateStatus {
  string installed_version = 1;
  string latest_version = 2;   // "" until a feed check has succeeded
  bool update_available = 3;
  string staged_version = 4;   // "" when nothing is staged; "(local)" for offline staging
  string staged_sha256 = 5;
  string staged_at = 6;
  string last_check = 7;
  string last_error = 8;
}

message StageUpdateRequest {
  string local_path = 1; // optional: stage this local installer instead of downloading
  string sha256 = 2;     // optional expected hash for local_path; reject on mismatch
}

message SupportBundleRequest {
  string since = 1;     // optional ISO-8601 floor for traffic profile rows
  string until = 2;     // optional ISO-8601 ceiling for traffic profile rows
  string process = 3;   // optional app/process substring
  string action = 4;    // optional event action exact match
  string protocol = 5;  // optional TCP/UDP exact match for connection rows
  int32 limit = 6;      // 0 = server default, max 10000 connections / 2000 events
}

message DefenderStatus {
  bool available = 1;
  bool hosts_excluded = 2;      // hosts file present in Defender's ExclusionPath
  bool possible_revert = 3;     // hosts file empty of blocks while the DB expects them
  string guidance = 4;
}

message ServiceStatus {
  string version = 1;
  bool elevated = 2;
  int64 uptime_seconds = 3;
  int32 hosts_blocked = 4;
  int32 db_blocked = 5;
  int32 db_allowed = 6;
  int32 feed_total = 7;
  bool dns_monitor_active = 8;
  bool connection_monitor_active = 9;
  // NET-169 runtime-health signals: monitor liveness, silent-drop counters,
  // and posture so support (and the NET-186 health glance) can tell whether the
  // service is healthy or quietly shedding work.
  bool sni_monitor_active = 10;
  bool bandwidth_monitor_active = 11;
  bool kill_switch_engaged = 12;
  bool secure_rules_armed = 13;
  int64 persistence_dropped_writes = 14;
  int64 persistence_write_batches = 15;
  int64 persistence_largest_batch = 16;
  int32 pending_consent = 17;
  int32 ech_unavailable = 18;
  int32 schema_version = 19;
  int32 schema_version_on_disk = 20;
  string filtering_mode = 21;
  // NET-183: hosts file is large enough to slow system-wide DNS resolution;
  // the UI/CLI suggests firewall IP rules for very large lists.
  bool hosts_over_scale_threshold = 22;
  // Provable runtime state: the .NET runtime the self-contained build bundles
  // and the SQLite engine version actually loaded, so support can confirm the
  // deployed patch level without guessing from the app version.
  string runtime_version = 23;
  string sqlite_version = 24;
}

// ─── Hosts control ───────────────────────────────────────────────────────────

service HostsControl {
  rpc Block(DomainRequest) returns (Ack);
  rpc Allow(DomainRequest) returns (Ack);
  rpc Unblock(DomainRequest) returns (Ack);
  rpc BlockRoot(DomainRequest) returns (Ack);
  // Bulk block/allow (NET-105): N domains → one DB update + ONE hosts-file write
  // (via reconcile), instead of N per-domain rewrites that each risk an AV lock.
  rpc BlockMany(BulkDomainsRequest) returns (BulkResult);
  rpc AllowMany(BulkDomainsRequest) returns (BulkResult);
  rpc ListDomains(ListDomainsRequest) returns (DomainList);
  rpc Reconcile(ReconcileRequest) returns (Ack);
  rpc EmergencyReset(Empty) returns (Ack);
  // Temporarily allow a blocked domain; the service re-blocks it when the
  // window expires and re-arms persisted windows across service restarts.
  rpc TempAllow(TempAllowRequest) returns (Ack);
  rpc ListTempAllows(Empty) returns (TempAllowList);
  // The mirror of TempAllow: temporarily block a domain; the service reverts it
  // to its prior state when the window expires and re-arms across restarts.
  rpc TempBlock(TempBlockRequest) returns (Ack);
  rpc ListTempBlocks(Empty) returns (TempBlockList);
  // Raw hosts file access for the editor view. Set routes through the
  // transactional engine (atomic write + self-write hash).
  rpc GetHostsText(Empty) returns (HostsText);
  rpc SetHostsText(HostsText) returns (Ack);
  // Feed visibility: hide a whole root (blanket, catches future subdomains) or
  // specific exact domains (e.g. every domain currently listed under a group).
  rpc HideRoot(DomainRequest) returns (Ack);
  rpc UnhideRoot(DomainRequest) returns (Ack);
  rpc HideDomains(HideDomainsRequest) returns (Ack);
  rpc UnhideDomains(HideDomainsRequest) returns (Ack);
  // Snapshot of recent DNS activity (the live delta streams via Monitoring.WatchDns).
  rpc GetActivity(ActivityRequest) returns (ActivityList);
  // 24h hourly hit histogram for a domain root (inline per-feed sparkline).
  rpc GetSparkline(DomainRequest) returns (Sparkline);
  // Copy the hosts file to a timestamped backup; path returned in Ack.message.
  rpc BackupHosts(Empty) returns (Ack);
  // Backup restore flow: enumerate the backups dir, then replace the live hosts
  // file with a chosen backup. Restore snapshots the current file first and
  // routes the write through the transactional engine.
  rpc ListBackups(Empty) returns (BackupList);
  rpc RestoreBackup(BackupRequest) returns (Ack);
  // Re-apply the hardened ACL to the hosts file.
  rpc HardenAcl(Empty) returns (Ack);
  // One-click: add the hosts file to Windows Defender's exclusions (WMI).
  rpc AddDefenderExclusion(Empty) returns (Ack);
  // AI domain categorization (DeepSeek). Config is stored in the ACL-locked
  // service data dir; the key is write-only (never returned).
  rpc SetAiConfig(AiConfig) returns (Ack);
  rpc GetAiStatus(Empty) returns (AiStatus);
  // Categorize the given domains (or every uncategorized blocked domain when
  // all_uncategorized is set), persist categories, and reorganize the managed
  // hosts entries under "# <Category>" section headers.
  rpc CategorizeDomains(CategorizeRequest) returns (CategorizeResult);
  // Manual-edit adoption (NET-188): when the user hand-edits the hosts file in a
  // text editor, dedupe + organize the whole file, curated-categorize, and adopt
  // the newly-added sink-block domains into the managed DB as "manual" entries.
  // AdoptHostsEntries runs the pass now; SetHostsAdoption toggles the automatic
  // on-external-change adoption; GetHostsAdoptionStatus reports the toggle + last run.
  rpc AdoptHostsEntries(Empty) returns (AdoptResult);
  rpc SetHostsAdoption(HostsAdoptionRequest) returns (Ack);
  rpc GetHostsAdoptionStatus(Empty) returns (HostsAdoptionStatus);
  // AI-research purpose descriptions for feed domains that have none (curated
  // or learned). Results persist to the ai_knowledge store.
  rpc ResearchPurposes(Empty) returns (CategorizeResult);
  // AI-identify what live connections are for; results persist to the
  // ai_knowledge store keyed by resolved host (or IP).
  rpc IdentifyConnections(IdentifyRequest) returns (IdentifyResult);
  // Everything the AI has learned (purposes, categories, connection info) as
  // reviewable JSON — the promotion path into the curated built-ins.
  rpc ExportAiKnowledge(Empty) returns (HostsText);
  // In-app AI-knowledge review (NET-107): list what the AI has learned (all or
  // only new since the last review), promote/discard entries into a persisted
  // user-override table that beats the AI, and correct a single domain's
  // category/purpose directly (the right-click "fix" path).
  rpc ListAiKnowledge(AiKnowledgeRequest) returns (AiKnowledgeList);
  rpc PromoteKnowledge(KnowledgeReviewRequest) returns (Ack);
  rpc OverrideKnowledge(KnowledgeOverrideRequest) returns (Ack);
}

message AiKnowledgeRequest {
  bool since_last_review = 1;   // true = only entries newer than the last review mark
}

message AiKnowledgeEntry {
  string kind = 1;        // "purpose" | "category" | "connection"
  string key = 2;         // domain, or host/ip for connections
  string value = 3;       // the AI-learned label
  string model = 4;
  string created = 5;
  string user_override = 6; // current user override for (kind,key); "" when none
  bool is_new = 7;        // created after the last review mark
}

message AiKnowledgeList {
  repeated AiKnowledgeEntry entries = 1;
  string last_reviewed = 2;   // ISO timestamp of the last review; "" = never
}

message KnowledgeReviewAction {
  string kind = 1;
  string key = 2;
  string action = 3;      // "promote" | "discard"
  string value = 4;       // promote: the (optionally edited) value to persist as an override
}

message KnowledgeReviewRequest {
  repeated KnowledgeReviewAction actions = 1;
  bool mark_reviewed = 2; // stamp the review timestamp (advances "since last review")
}

message KnowledgeOverrideRequest {
  string kind = 1;        // "purpose" | "category"
  string key = 2;         // domain
  string value = 3;       // the corrected label ("" clears the override)
}

message IdentifyItem {
  string remote_addr = 1;
  string host = 2;      // resolved domain when known; "" = identify by IP
  string process = 3;
  int32 remote_port = 4;
}

message IdentifyRequest {
  repeated IdentifyItem items = 1;
}

message IdentifiedItem {
  string key = 1;       // host when known, else the remote IP
  string info = 2;      // short human explanation of the connection
}

message IdentifyResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  repeated IdentifiedItem items = 4;
}

message AiConfig {
  string api_key = 1;    // "" keeps the stored key
  string model = 2;      // "" = deepseek-chat
  string endpoint = 3;   // "" = https://api.deepseek.com
  bool enabled = 4;      // auto-categorize new manual blocks
}

message AiStatus {
  bool configured = 1;   // an API key is stored
  bool enabled = 2;
  string model = 3;
  string endpoint = 4;
  string last_run = 5;   // ISO timestamp of the last categorization; "" = never
  string last_result = 6;
}

message CategorizeRequest {
  repeated string domains = 1;
  bool all_uncategorized = 2;
  // Categorize every hosts-FILE entry lacking a category (including entries
  // not managed in the DB), reusing the file's existing "# Category" section
  // names as the preferred vocabulary.
  bool hosts_file = 3;
}

message DomainCategory {
  string domain = 1;
  string category = 2;
}

message CategorizeResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int32 categorized = 4;
  repeated DomainCategory items = 5;
}

// ─── Blocklist / allowlist subscriptions ─────────────────────────────────────

service ListControl {
  // Curated catalog + subscription state.
  rpc ListBlocklistSources(Empty) returns (BlocklistSources);
  // Fetch + parse without mutating hosts/DB; reports the same health counters.
  rpc PreviewBlocklist(BlocklistRequest) returns (BlocklistResult);
  // Fetch + parse + bulk-import one source; records a subscription for refresh.
  rpc ImportBlocklist(BlocklistRequest) returns (BlocklistResult);
  // Enable/disable refresh for one subscribed source (imported domains stay).
  rpc SetBlocklistEnabled(BlocklistToggleRequest) returns (Ack);
  // Remove a source and roll back domains owned only by that source.
  rpc RemoveBlocklistSubscription(BlocklistRequest) returns (Ack);
  // Restore the latest pre-refresh checkpoint for one subscribed source.
  rpc RestoreBlocklistCheckpoint(BlocklistRequest) returns (Ack);
  // Re-import every subscribed source now.
  rpc RefreshBlocklists(Empty) returns (BlocklistResult);
  rpc RecoverWindowsConnectivity(WindowsConnectivityRecoveryRequest) returns (WindowsConnectivityRecoveryResult);
  // Allowlist subscriptions: whitelisted domains always win over blocklists.
  rpc GetAllowlists(Empty) returns (AllowlistUrls);
  rpc SetAllowlists(AllowlistUrls) returns (Ack);
  rpc RefreshAllowlists(Empty) returns (Ack);
  // Threat-intel IP overlay (Feodo) and the offline GeoIP database.
  rpc RefreshThreatIntel(Empty) returns (Ack);
  rpc RefreshGeoIp(Empty) returns (Ack);
  // Blocklist intelligence: every catalog source downloaded into a local
  // domain→list index (NOT imported as blocks) so the feed can flag domains
  // the reference lists would block. Refreshed on first start and weekly.
  rpc GetBlocklistIntelligence(Empty) returns (BlocklistIntelStatus);
  rpc RefreshBlocklistIntelligence(Empty) returns (Ack);
  // IP-format blocklists (NET-171): opt-in sources of IPv4/IPv6/CIDR entries
  // enforced as chunked HG_IPBlock_* Windows Firewall block rules — hosts-file
  // blocking cannot stop hardcoded-IP C2 or DoH-bootstrap-IP bypass.
  rpc ListIpBlocklists(Empty) returns (IpBlocklistList);
  rpc ImportIpBlocklist(BlocklistRequest) returns (IpBlocklistResult);
  rpc SetIpBlocklistEnabled(BlocklistToggleRequest) returns (Ack);
  rpc RemoveIpBlocklist(BlocklistRequest) returns (Ack);
  rpc RefreshIpBlocklists(Empty) returns (IpBlocklistResult);
  rpc RollbackIpBlocklist(BlocklistRequest) returns (IpBlocklistResult);
}

message IpBlocklistSource {
  string name = 1;
  string url = 2;
  bool enabled = 3;
  int64 address_count = 4;   // entries currently enforced
  int64 rule_count = 5;      // HG_IPBlock_* rules carrying those entries
  string health_status = 6;  // ok|new|guarded|error|restored
  string content_hash = 7;
  string previous_hash = 8;
  int64 previous_address_count = 9;
  string last_error = 10;
  string last_error_at = 11;
  string last_refresh = 12;
  bool truncated = 13;       // list exceeded the rule cap; tail entries dropped
}

message IpBlocklistList {
  repeated IpBlocklistSource sources = 1;
}

message IpBlocklistResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int64 total = 4;       // valid entries parsed from the source
  int64 invalid = 5;     // unparseable lines dropped
  int64 duplicates = 6;  // duplicate entries dropped
  int64 unsafe = 7;      // parseable but non-routable/over-wide entries refused
  int64 rules = 8;       // firewall rules written
  bool truncated = 9;    // entries beyond the rule cap were dropped (see warning)
  int64 guarded = 10;    // refreshes skipped by the churn guard
  int64 failed = 11;     // refreshes that failed fetch/parse
  string warning = 12;
}

message BlocklistIntelStatus {
  int32 lists = 1;        // reference lists currently indexed
  int64 domains = 2;      // distinct (domain, list) rows
  string refreshed = 3;   // ISO timestamp of the last successful refresh; "" = never
  bool refreshing = 4;    // a refresh is running right now
}

message BlocklistRequest {
  string name = 1;
  string url = 2;
}

message BlocklistToggleRequest {
  string name = 1;
  bool enabled = 2;
}

message BlocklistSource {
  string category = 1;
  string name = 2;
  string url = 3;
  bool subscribed = 4;
  string last_refresh = 5;
  int64 domain_count = 6;
  bool large_list_warning = 7; // known to bloat the hosts file (DNS Client CPU)
  string mirror = 8;           // fallback URL (NET-077); "" when none
  bool enabled = 9;            // subscribed source participates in refresh
  int64 owned_domain_count = 10; // source-owned rows that rollback can inspect
  int64 hits_30d = 11;         // exact DNS/feed hits attributed to this source
  string health_status = 12;   // ok|new|guarded|error|restored
  string content_hash = 13;    // SHA-256 of the last successfully applied payload
  string previous_hash = 14;   // SHA-256 before the last successful apply/restore
  int64 previous_domain_count = 15;
  string last_error = 16;      // most recent fetch/guard failure
  string last_error_at = 17;   // ISO timestamp of the most recent failure
  int64 rollback_checkpoint_id = 18; // latest checkpoint id, 0 when none
  int64 last_attempt_domain_count = 19;
  string last_attempt_hash = 20;
  // NET-174 catalog metadata for the "add a list" gallery.
  string homepage = 21;
  string license = 22;
  string tags = 23;        // comma-separated
  string description = 24;
}

message BlocklistSources {
  repeated BlocklistSource sources = 1;
}

message BlocklistResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int64 added = 4;          // newly blocked in the hosts file
  int64 total = 5;          // domains parsed from the source(s)
  int64 hosts_entries = 6;  // hosts-file entry count after import
  string warning = 7;       // e.g. DNS-Client CPU warning above 100k entries
  // NET-077 merge health report.
  int64 duplicates = 8;        // duplicate domains dropped
  int64 invalid = 9;           // unparseable/invalid lines dropped
  int64 hijack_flagged = 10;   // domains pointed at a non-sink routable IP (excluded)
  int64 allowlist_overrides = 11; // imported domains an allowlist kept unblocked
  bool mirror_used = 12;       // the primary URL failed and the mirror served the list
  int64 removed = 13;          // source rollback: domains deleted
  int64 preserved = 14;        // source rollback: rows kept (manual/allowlist/other-source)
  bool preview = 15;           // true when this is a no-mutation preview result
  int64 guarded = 16;          // refreshes skipped by churn guard
  int64 failed = 17;           // refreshes that failed fetch/parse
  int64 checkpoint_id = 18;    // latest checkpoint created/restored by this operation
  int64 modifiers_stripped = 19; // adblock $modifier rules stripped, never imported (NET-174)
  repeated WindowsConnectivityWarning connectivity_warnings = 20;
}

message WindowsConnectivityWarning {
  string domain = 1;
  string probe_kind = 2; // web | dns
  string era = 3;        // current | legacy
  string reason = 4;
  string code = 5;       // windows_ncsi_dependency
}

message WindowsConnectivityRecoveryRequest {
  repeated string domains = 1; // empty = every currently list-blocked exact NCSI dependency
}

message WindowsConnectivityRecoveryResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  repeated string recovered_domains = 4;
  repeated string rejected_domains = 5;
}

message AllowlistUrls {
  repeated string urls = 1;
}

message TempAllowRequest {
  string domain = 1;
  int32 minutes = 2;
  string source = 3;
}

message TempAllowEntry {
  string domain = 1;
  google.protobuf.Timestamp expires = 2;
}

message TempAllowList {
  repeated TempAllowEntry entries = 1;
}

message TempBlockRequest {
  string domain = 1;
  int32 minutes = 2;
  string source = 3;
}

message TempBlockEntry {
  string domain = 1;
  google.protobuf.Timestamp expires = 2;
}

message TempBlockList {
  repeated TempBlockEntry entries = 1;
}

message HostsText {
  string text = 1;
}

message BulkDomainsRequest {
  repeated string domains = 1;
  string reason = 2;
  string source = 3;
}

message BulkResult {
  bool ok = 1;
  string message = 2;
  string error_code = 3;
  int32 applied = 4;   // domains newly written to the hosts file
  int32 total = 5;     // valid domains in the request
}

message BackupEntry {
  string file_name = 1;   // name only — never a path
  string created = 2;     // local "yyyy-MM-dd HH:mm:ss"
  int64 size_bytes = 3;
}

message BackupList {
  repeated BackupEntry entries = 1;
}

message BackupRequest {
  string file_name = 1;   // must match a BackupEntry.file_name
}

message ActivityRequest {
  int32 limit = 1;        // 0 = server default
  string search = 2;      // shared search DSL
  bool include_hidden = 3;
}

message ActivityRow {
  string domain = 1;
  string root = 2;
  string status = 3;      // "blocked" | "whitelisted" | ""
  string process = 4;
  int64 hits = 5;
  string first_seen = 6;
  string last_seen = 7;
  bool hidden = 8;
  string reason = 9;
  // Blocklist-intelligence membership: names of downloaded reference lists
  // that block this exact domain (a block-candidate signal in the feed).
  repeated string blocklists = 10;
  // Purpose description: the curated table first, then AI-researched
  // knowledge (ai_knowledge kind=purpose); "" when unknown.
  string purpose = 11;
  // Per-domain data volume in bytes (sent+recv), attributed via the resolved
  // remote IP (NET-108); 0 when no bytes have been attributed yet.
  int64 bytes = 12;
  // True when first_seen falls within the newly-observed window (default 24h) —
  // a purely local "never seen before on this machine until recently" cue.
  bool is_new = 13;
}

message ActivityList {
  repeated ActivityRow rows = 1;
}

message Sparkline {
  repeated int32 hits = 1; // 24 hourly buckets, oldest → newest
}

message DomainRequest {
  string domain = 1;
  string reason = 2;   // canonical reason key or free-form (server canonicalizes)
  string source = 3;
}

message ListDomainsRequest {
  string status = 1;   // "", "blocked", "whitelisted"
  string search = 2;   // shared search DSL
  string source = 3;
}

message ManagedDomain {
  string domain = 1;
  string status = 2;
  string source = 3;
  string reason = 4;
  int64 hits = 5;
  google.protobuf.Timestamp added = 6;
  google.protobuf.Timestamp modified = 7;
  string notes = 8;
  string category = 9;   // e.g. "Google Ads", "Microsoft Telemetry"; "" = uncategorized
}

message DomainList {
  repeated ManagedDomain domains = 1;
}

message ReconcileRequest {
  repeated string blocked = 1;   // exact target set to enforce in the hosts file
}

// ─── Firewall control ────────────────────────────────────────────────────────

service FirewallControl {
  // Adopt existing Windows Firewall rules (NET-095, opt-in, non-destructive):
  // record the machine's current non-HG_ WF rules into HostsGuard's view so
  // onboarding isn't a blank slate. Nothing on the live firewall is mutated.
  rpc AdoptFirewallRules(Empty) returns (AdoptResult);
  // Subscribable rule groups (NET-103): assign HG_ rules to a named group and
  // enable/disable the whole group atomically.
  rpc AssignRuleGroup(RuleGroupAssignment) returns (Ack);
  // Report-only duplicate/contradictory/ineffective-rule analysis. The
  // fingerprint binds any later selected cleanup to this exact rule snapshot.
  rpc AnalyzeRules(FirewallRuleAnalysisRequest) returns (FirewallRuleAnalysisResult);
  rpc ListRuleGroups(Empty) returns (RuleGroupList);
  rpc ToggleRuleGroup(RuleGroupToggle) returns (Ack);
  rpc BlockIp(FirewallIpRequest) returns (Ack);
  rpc BlockProgram(FirewallProgramRequest) returns (Ack);
  rpc CreateRule(FirewallRule) returns (Ack);
  rpc DeleteRule(RuleNameRequest) returns (Ack);
  // Rule/hosts/posture explainer (NET-140): simulate the ordered local
  // decision chain for a selected row or manually entered domain/IP/process.
  rpc ExplainDecision(DecisionExplainRequest) returns (DecisionExplanation);
  rpc SetRuleEnabled(RuleEnabledRequest) returns (Ack);
  rpc UpdateRule(FirewallRule) returns (Ack);
  // AppContainer/MSIX package inventory for package-family firewall rules.
  rpc ListAppPackages(Empty) returns (AppPackageList);
  rpc ListInterfaceAliases(Empty) returns (FirewallInterfaceList);
  rpc ListRules(Empty) returns (FirewallRuleList);
  // Cleanup is never automatic: preview validates selected HG_ findings and
  // returns a selection fingerprint; apply requires the unchanged analysis,
  // exact selected names, and that preview fingerprint.
  rpc ApplyRuleCleanup(FirewallRuleCleanupRequest) returns (FirewallRuleCleanupResult);
  rpc BlockEncryptedDns(DohBlockRequest) returns (Ack);
  rpc UnblockEncryptedDns(Empty) returns (Ack);
  // QUIC/HTTP3 (outbound UDP/443) blocking. Forces clients to fall back to
  // TCP/HTTP2 so DoH3 and general QUIC can't bypass hosts/SNI-based blocking.
  // Opt-in, off by default; clean TCP fallback means no user-visible breakage.
  rpc BlockQuic(Empty) returns (Ack);
  rpc UnblockQuic(Empty) returns (Ack);
  // Default-outbound posture (lockdown). Set flips DefaultOutboundAction on
  // all profiles; it never touches the firewall on/off switch.
  rpc GetPosture(Empty) returns (FirewallPosture);
  rpc SetDefaultOutbound(OutboundRequest) returns (Ack);
  // Timed global pause (NET-149): temporarily remove hosts-file blocks and set
  // default-outbound Allow, then auto-resume the saved posture at expiry.
  rpc GetEnforcementPause(Empty) returns (EnforcementPauseStatus);
  rpc PauseEnforcement(EnforcementPauseRequest) returns (Ack);
  // Secure-Rules tamper-guard: recreate/re-enable HG_ rules changed behind our
  // back. Opt-in; only ever touches HostsGuard's own rules.
  rpc GetSecureRules(Empty) returns (SecureRulesStatus);
  rpc SetSecureRules(SecureRulesRequest) returns (Ack);
  // Orphan rebind: rank identity-matched replacement binaries for a program
  // rule whose target vanished, then re-target the rule.
  rpc SuggestRebind(RuleNameRequest) returns (RebindSuggestions);
  rpc RebindRule(RebindRequest) returns (Ack);
  // Global outbound posture selector (NET-076): "block-all" | "allow-all"
  // maps to the default-outbound action on every profile; applied without a
  // restart. Never touches the firewall on/off switch.
  rpc SetGlobalMode(GlobalModeRequest) returns (Ack);
  // Per-app network-scope block (NET-076): block a program's access to the
  // Internet / LAN / localhost, or all inbound. Portmaster-style scope rules.
  rpc BlockAppScope(AppScopeRequest) returns (Ack);
  rpc UnblockAppScope(AppScopeRequest) returns (Ack);
  // Domain-scoped firewall enforcement (NET-154): maintain HG_Domain_* rules
  // whose RemoteAddresses follow observed/periodically refreshed DNS answers.
  rpc CreateDomainFirewallRule(DomainFirewallRuleRequest) returns (Ack);
  rpc DeleteDomainFirewallRule(RuleNameRequest) returns (Ack);
  rpc ListDomainFirewallRules(Empty) returns (DomainFirewallRuleList);
  rpc RefreshDomainFirewallRules(Empty) returns (Ack);
  // Immediate IPv4 TCP flow teardown (NET-152): manual close plus opt-in
  // automatic close after block actions. IPv6 is reported unsupported.
  rpc CloseConnection(FlowCloseRequest) returns (Ack);
  rpc GetFlowTeardown(Empty) returns (FlowTeardownStatus);
  rpc SetFlowTeardown(FlowTeardownRequest) returns (Ack);
  // LAN attack-surface hardening (NET-155): reversible registry + HG_ firewall
  // controls for discovery/name-resolution protocols that are noisy on LANs.
  rpc GetLanAttackSurface(Empty) returns (LanAttackSurfaceStatus);
  rpc SetLanAttackSurface(LanAttackSurfaceRequest) returns (Ack);
  // VPN-presence kill-switch (NET-119): when the chosen VPN adapter is down,
  // force default-outbound Block on every profile so nothing leaks outside the
  // tunnel; restore the prior posture when it returns. Opt-in, off by default.
  rpc GetKillSwitch(Empty) returns (KillSwitchStatus);
  rpc SetKillSwitch(KillSwitchRequest) returns (Ack);
  // Per-app VPN binding (NET-157): a program may connect only through the
  // selected adapter by blocking it on every other active interface. Opt-in.
  rpc GetAppVpnBindings(Empty) returns (AppVpnBindingStatus);
  rpc SetAppVpnBinding(AppVpnBindingRequest) returns (Ack);
}

message KillSwitchRequest {
  bool enabled = 1;
  string adapter = 2;   // name/description substring of the VPN adapter to watch
}

message KillSwitchStatus {
  bool enabled = 1;
  string adapter = 2;
  bool engaged = 3;                   // block-all is being enforced right now (VPN down)
  repeated NetworkAdapterInfo adapters = 4;  // interfaces for the picker
}

message NetworkAdapterInfo {
